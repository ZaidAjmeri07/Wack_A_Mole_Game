<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Whack-a-Mole!</h1>

    <div class="scoreboard">
        <h2>Score: 
            <span id="score">0</span>
        </h2>

        <h2>Best:
            <span id="best-score">0</span>
        </h2>

        <h2>Time Left:
            <span id="timer">20</span>
        </h2>
    </div>

    <button id="start-btn">
        Start Game
    </button>

    <div class="grid">
        <div class="hole hole1" id="1"></div>
        <div class="hole hole2" id="2"></div>
        <div class="hole hole3" id="3"></div>
        <div class="hole hole4" id="4"></div>
        <div class="hole hole5" id="5"></div>
        <div class="hole hole6" id="6"></div>
        <div class="hole hole7" id="7"></div>
        <div class="hole hole8" id="8"></div>
        <div class="hole hole9" id="9"></div>
    </div>

    <div id="game-over" class="hidden">
        <div class="game-over-box">
            <h2>Time's Up!</h2>
            <p id="final-score-text"></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="./script.js"></script>


</body></html>
